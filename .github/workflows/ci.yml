name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run tests
        run: composer test

  conformance-drift:
    name: Conformance fixtures match upstream spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this SDK
        uses: actions/checkout@v4
        with:
          path: sdk

      - name: Checkout flametrench/spec
        uses: actions/checkout@v4
        with:
          repository: flametrench/spec
          ref: main
          path: spec

      - name: Verify vendored fixtures are byte-identical to upstream
        run: |
          set -euo pipefail
          SDK_FIXTURES=sdk/tests/conformance/fixtures/ids
          SPEC_FIXTURES=spec/conformance/fixtures/ids
          if ! diff -r "$SDK_FIXTURES" "$SPEC_FIXTURES"; then
            echo "::error::Vendored conformance fixtures have drifted from flametrench/spec."
            echo "To resolve: copy spec/conformance/fixtures/ids/*.json into tests/conformance/fixtures/ids/ and commit."
            exit 1
          fi
          echo "✅ All vendored ID fixtures match upstream."
